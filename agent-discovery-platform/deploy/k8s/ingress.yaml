apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-discovery-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: agents.enterprise.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agent-discovery-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-discovery-frontend
            port:
              number: 80
